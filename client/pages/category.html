<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category — img-view</title>

  <script>
    const _t = localStorage.getItem('theme') || 'modern';
    document.write('<link id="theme-link" rel="stylesheet" href="/css/theme-' + _t + '.css">');
  </script>
  <link rel="stylesheet" href="/css/base.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-logo" href="/pages/home.html">img<span>·</span>view</a>

      <div class="navbar-search">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Filter images in this category…" autocomplete="off" />
          <button id="search-clear" class="hidden" title="Clear">✕</button>
        </div>
      </div>

      <div class="navbar-actions">
        <button class="btn btn-ghost" id="btn-nav-images">Images</button>
        <button class="btn btn-ghost" id="btn-nav-videos">Videos</button>
        <button class="btn btn-ghost" id="btn-nav-organize">Organize</button>
        <button class="btn btn-primary" id="btn-random-cat" title="Random image from this category">Random</button>
        <button class="btn-icon theme-toggle" id="theme-toggle-btn" title="Switch theme"></button>
      </div>
    </div>
  </nav>

  <main class="container page">

    <!-- Breadcrumb -->
    <nav class="breadcrumb" aria-label="breadcrumb">
      <a href="/pages/home.html">Home</a>
      <span class="sep">›</span>
      <span class="current" id="breadcrumb-name">…</span>
    </nav>

    <!-- Toolbar -->
    <div class="toolbar">

      <div class="toolbar-group">
        <label for="sort-select">Sort</label>
        <select class="select" id="sort-select">
          <option value="name">Name</option>
          <option value="modified">Date modified</option>
          <option value="random">Random</option>
        </select>
        <button class="btn-icon" id="btn-order" title="Toggle sort order">↑</button>
      </div>

      <div class="toolbar-group" style="margin-left:auto;">
        <label for="size-slider">Size</label>
        <input type="range" class="size-slider" id="size-slider" min="2" max="10" value="5" step="1" />
      </div>

      <button class="btn btn-ghost btn-sm" id="btn-select-mode" title="Select multiple images">Select</button>

      <div id="image-count" style="font-size:0.8rem;color:var(--text-muted);white-space:nowrap;"></div>

    </div>

    <!-- Sidebar + grid layout -->
    <div class="page-layout">

      <aside class="tag-sidebar">
        <div class="tag-sidebar-header">
          <span class="tag-sidebar-title">Tags</span>
          <button class="tag-sidebar-clear hidden" id="btn-clear-tags">Clear</button>
        </div>
        <div id="tag-sidebar-list" class="tag-sidebar-list">
          <span class="tag-sidebar-empty">Loading…</span>
        </div>
      </aside>

      <div class="page-content">
        <div id="image-grid" class="image-grid" style="--grid-cols: 5;"></div>
        <div id="state-loading" class="spinner"></div>
        <div id="state-empty" class="empty-state hidden">
          <div class="icon">🖼</div>
          <p>No images found.</p>
        </div>
      </div>

    </div>

  </main>

  <!-- Selection action bar (fixed at bottom, shown in selection mode) -->
  <div id="selection-bar" class="hidden">
    <div class="selection-bar-inner container">
      <span id="selection-count">0 selected</span>
      <div style="display:flex;gap:0.5rem;">
        <button class="btn btn-ghost btn-sm" id="btn-select-all">Select all</button>
        <button class="btn btn-ghost btn-sm" id="btn-select-copy">Copy to…</button>
        <button class="btn btn-primary btn-sm" id="btn-select-move">Move to…</button>
        <button class="btn btn-ghost btn-sm" id="btn-select-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <style>
    /* ── Selection mode ── */
    #selection-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 16px rgba(0,0,0,0.25);
    }
    .selection-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 2rem;
      gap: 1rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    #btn-select-mode.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .select-mode .card { cursor: crosshair; }
    .select-mode .card:hover { outline: 2px solid var(--border); }
    .select-mode .card.selected { outline: 2px solid var(--accent); }
    .card-select-check {
      display: none;
      position: absolute;
      top: 6px;
      left: 6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
      z-index: 2;
    }
    .select-mode .card { position: relative; }
    .select-mode .card-select-check { display: flex; }
    .select-mode .card.selected .card-select-check {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
  </style>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/context-menu.js"></script>
  <script src="/js/category.js"></script>
  <script src="/js/navbar.js"></script>
</body>
</html>
