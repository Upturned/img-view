<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videos — img-view</title>

  <script>
    const _t = localStorage.getItem('theme') || 'modern';
    document.write('<link id="theme-link" rel="stylesheet" href="/css/theme-' + _t + '.css">');
  </script>
  <link rel="stylesheet" href="/css/base.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-logo" href="/pages/home.html">img<span>·</span>view</a>

      <div class="navbar-search">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Filter categories…" autocomplete="off" />
          <button id="search-clear" class="hidden" title="Clear">✕</button>
        </div>
      </div>

      <div class="navbar-actions">
        <button class="btn btn-ghost" id="btn-nav-images">Images</button>
        <button class="btn btn-ghost" id="btn-nav-videos">Videos</button>
        <button class="btn btn-ghost" id="btn-nav-organize">Organize</button>
        <button class="btn btn-primary" id="btn-random-global-video">Random</button>
        <button class="btn-icon theme-toggle" id="theme-toggle-btn" title="Switch theme"></button>
      </div>
    </div>
  </nav>

  <main class="container page">

    <!-- Category view -->
    <section id="section-categories">
      <div class="section-header">
        <h2 id="categories-title">Video Categories</h2>
        <button class="btn btn-ghost btn-sm" id="btn-new-category">+ New category</button>
      </div>
      <div id="categories-grid" class="image-grid" style="--grid-cols:5;"></div>
      <div id="categories-empty" class="empty-state hidden">
        <div class="icon">🎬</div>
        <p>No video categories yet. Drop video folders into <code>/videos</code> or create one.</p>
      </div>
    </section>

    <!-- Video list view (shown when a category is opened) -->
    <section id="section-videos" class="hidden">
      <nav class="breadcrumb">
        <a href="#" id="breadcrumb-home-link">Videos</a>
        <span class="sep">›</span>
        <span class="current" id="breadcrumb-cat-name">—</span>
      </nav>

      <div class="toolbar">
        <div class="toolbar-group">
          <label for="sort-select">Sort</label>
          <select class="select" id="sort-select">
            <option value="name">Name</option>
            <option value="modified">Date modified</option>
          </select>
          <button class="btn-icon" id="btn-order" title="Toggle order">↑</button>
        </div>
        <button class="btn btn-primary btn-sm" id="btn-random-cat-video">Random</button>
        <div id="video-count" style="font-size:0.8rem;color:var(--text-muted);margin-left:auto;"></div>
      </div>

      <div id="video-grid" class="image-grid" style="--grid-cols:4;"></div>
      <div id="video-empty" class="empty-state hidden">
        <div class="icon">🎬</div>
        <p>No videos in this category.</p>
      </div>
    </section>

  </main>

  <!-- New category modal -->
  <div id="modal-new-category" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-title">New Video Category</div>
      <input class="input" id="input-category-name" type="text" placeholder="Category name…" maxlength="80" />
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-cancel-category">Cancel</button>
        <button class="btn btn-primary" id="btn-confirm-category">Create</button>
      </div>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/context-menu.js"></script>
  <script src="/js/videos.js"></script>
  <script src="/js/navbar.js"></script>

  <style>
    .video-card-cover {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .video-card-cover video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .video-card-cover video.loaded { opacity: 1; }

    .play-icon {
      position: absolute;
      font-size: 2rem;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .card:hover .play-icon { opacity: 1; }
  </style>
</body>
</html>
